name: Build Hacklily Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"
      - "offline-v*"

permissions:
  contents: write

env:
  LILYPOND_VERSION: "2.24.4"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: mac
            artifact_glob: "desktop/release/*.dmg"
          - os: windows-2022
            target: win
            artifact_glob: "desktop/release/*.exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Prepare runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          VERSION="${LILYPOND_VERSION}"
          URL="https://gitlab.com/lilypond/lilypond/-/releases/v${VERSION}/downloads/lilypond-${VERSION}-darwin-x86_64.tar.gz"
          TMP_DIR="$(mktemp -d)"
          ARCHIVE="${TMP_DIR}/lilypond.tar.gz"

          curl -fL "${URL}" -o "${ARCHIVE}"
          tar -xzf "${ARCHIVE}" -C "${TMP_DIR}"

          rm -rf desktop/runtime/current
          mv "${TMP_DIR}/lilypond-${VERSION}" desktop/runtime/current
          chmod +x desktop/runtime/current/bin/lilypond

          if [ -f desktop/runtime/current/bin/musicxml2ly ]; then
            chmod +x desktop/runtime/current/bin/musicxml2ly
          fi

      - name: Prepare runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "${{ env.LILYPOND_VERSION }}"
          $Url = "https://gitlab.com/lilypond/lilypond/-/releases/v$Version/downloads/lilypond-$Version-mingw-x86_64.zip"
          $Archive = Join-Path $env:RUNNER_TEMP "lilypond-$Version-win.zip"
          $ExtractRoot = Join-Path $env:RUNNER_TEMP "lilypond-$Version-win"
          $RuntimeSource = Join-Path $ExtractRoot "lilypond-$Version"

          Invoke-WebRequest -Uri $Url -OutFile $Archive

          if (Test-Path $ExtractRoot) {
            Remove-Item $ExtractRoot -Recurse -Force
          }

          Expand-Archive -Path $Archive -DestinationPath $ExtractRoot

          if (-not (Test-Path $RuntimeSource)) {
            throw "Runtime source not found: $RuntimeSource"
          }

          if (Test-Path "desktop/runtime/current") {
            Remove-Item "desktop/runtime/current" -Recurse -Force
          }

          New-Item -ItemType Directory -Path "desktop/runtime/current" | Out-Null
          Copy-Item "$RuntimeSource/*" "desktop/runtime/current" -Recurse -Force

      - name: Validate runtime payload
        run: npm run check:runtime
        working-directory: desktop

      - name: Smoke test runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          LILYPOND="desktop/runtime/current/bin/lilypond"
          TMPDIR_SMOKE="$(mktemp -d)"
          printf '\\version "2.24.0"\n{ c'"'"'4 d e f }\n' > "${TMPDIR_SMOKE}/test.ly"
          "${LILYPOND}" -o "${TMPDIR_SMOKE}/out" "${TMPDIR_SMOKE}/test.ly"
          test -f "${TMPDIR_SMOKE}/out.pdf"
          echo "LilyPond smoke test passed"

      - name: Smoke test runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $LilypondBin = "desktop/runtime/current/bin/lilypond.exe"
          $TmpPath = Join-Path $env:RUNNER_TEMP "lilypond-smoke"
          New-Item -ItemType Directory -Path $TmpPath -Force | Out-Null
          $Score = '\version "2.24.0"' + "`n" + "{ c'4 d e f }"
          Set-Content -Path (Join-Path $TmpPath "test.ly") -Value $Score -Encoding utf8
          & $LilypondBin -o (Join-Path $TmpPath "out") (Join-Path $TmpPath "test.ly")
          if ($LASTEXITCODE -ne 0) { throw "lilypond exited with code $LASTEXITCODE" }
          if (-not (Test-Path (Join-Path $TmpPath "out.pdf"))) { throw "out.pdf not found after render" }
          Write-Host "LilyPond smoke test passed"

      - name: Build installer
        run: npm run dist:${{ matrix.target }}
        working-directory: desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: hacklily-desktop-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}

  release:
    if: |
      startsWith(github.ref, 'refs/tags/desktop-v') ||
      startsWith(github.ref, 'refs/tags/offline-v') ||
      (
        github.event_name == 'workflow_dispatch' &&
        (startsWith(github.ref_name, 'desktop-v') || startsWith(github.ref_name, 'offline-v'))
      )
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
